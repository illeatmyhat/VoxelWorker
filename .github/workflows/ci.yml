name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # GitHub runners have NO GPU. Building never needs one; the GPU-dependent
  # integration tests are always compiled and skip LOUDLY at runtime when no adapter
  # is present, so the default `cargo test` is green here. The `shot` binary needs a
  # GPU at run time, so we build it but never execute it. `shot` is the dense-oracle
  # golden tool and now its OWN workspace package (`crates/shot`), which enables the
  # `document/oracle` + `evaluation/oracle` features itself — so `--workspace` builds
  # it with no flags to pass and no way to silently skip it.
  lint-build-test:
    name: Lint, build & test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps (egui/winit/wgpu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build all binaries
        run: cargo build --workspace --bins

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      # Documentation gate: broken and redundant intra-doc links fail the build so
      # doc references cannot silently drift from the code (e.g. a link to a renamed
      # or retired symbol). Public->private links are permitted by a crate-level
      # `#![allow(rustdoc::private_intra_doc_links)]`; everything else `-D warnings`
      # catches. `--no-deps` keeps the check to this workspace's own crates.
      - name: Doc (deny broken/redundant intra-doc links)
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Test (GPU-free; `gpu` feature off)
        run: cargo test

      # The substrate library is a separate workspace member with no features
      # and no domain dependencies; it carries its own gates so a regression in
      # the pure CS/math layer fails independently of the app crate.
      - name: Clippy substrate (deny warnings)
        run: cargo clippy -p substrate --all-targets -- -D warnings

      - name: Test substrate
        run: cargo test -p substrate

      # The voxel_core library is the foundational value-vocabulary member (one layer
      # above substrate): the resolved voxel cell + sparse grid, the recentre frame, the
      # SDF value functions, the block-palette id / cell-key codec, the absolute-voxel box
      # + leaf index, and the units core. It depends only on glam + serde + substrate and
      # carries its own gates so a regression in the value layer fails independently.
      - name: Clippy voxel_core (deny warnings)
        run: cargo clippy -p voxel_core --all-targets -- -D warnings

      - name: Test voxel_core
        run: cargo test -p voxel_core

      # The document library is the authored-TRUTH member (one layer above voxel_core):
      # the scene graph, the producers (SdfShape / sketch solid / debug clouds), the 2D
      # sketch, the Intent mutation boundary, and the inverse-command undo stack. It
      # imports no evaluation/display/wgpu and carries its own gates so a regression in
      # the truth layer fails independently of the app crate.
      - name: Clippy document (deny warnings)
        run: cargo clippy -p document --all-targets -- -D warnings

      - name: Test document
        run: cargo test -p document

      # The evaluation library is the ONE EVALUATOR member (one layer above document): the
      # residency + per-chunk resolve store, the boundary-aware two-layer chunk + block
      # classifier, the sparse chunk codec, the out-of-core spill store, and the boundary
      # cuboid decomposition. It consumes the document and produces the classified boundary
      # set, imports no display/work/shell, and carries its own gates so a regression in the
      # evaluator fails independently of the app crate.
      - name: Clippy evaluation (deny warnings)
        run: cargo clippy -p evaluation --all-targets -- -D warnings

      - name: Test evaluation
        run: cargo test -p evaluation

      # The assets library is a PURE-CPU LEAF below the domain layers: it scans a game install /
      # picked folder for chiselable block textures, groups them, resolves per-face maps from
      # Vintage Story's lenient block JSON, and decodes the chosen PNGs to RGBA. It links no
      # wgpu/egui and names no domain crate; it carries its own gates so a content-loader
      # regression fails independently of the crates above it.
      - name: Clippy assets (deny warnings)
        run: cargo clippy -p assets --all-targets -- -D warnings

      - name: Test assets
        run: cargo test -p assets

      # The display library is the ONE CRATE THAT LINKS wgpu (one layer above evaluation):
      # every GPU sink — the cuboid mesher, the brick field + raymarch, the material atlas,
      # the block palette + thumbnails, and the render pipelines (block thumbnails decode from
      # the pure-CPU `assets` leaf). It consumes
      # the evaluation layer's classified two-layer chunks and produces pixels; the device/
      # queue are handed in, and it imports no work/shell. It carries its own gates so a
      # regression in a GPU sink fails independently of the app crate. (These CPU-side tests
      # need no GPU device; the GPU-device integration suites stay in the app under
      # `cargo test --features gpu`.)
      - name: Clippy display (deny warnings)
        run: cargo clippy -p display --all-targets -- -D warnings

      - name: Test display
        run: cargo test -p display

      # The interchange library is the HEADLESS export sink (one layer above evaluation,
      # parallel to display): it serialises the evaluated boundary set to external formats —
      # today the MagicaVoxel `.vox` writer — and NEVER links wgpu/egui/winit (export is
      # CPU-owned truth; a headless build exports the same bytes). It imports no display/work/
      # shell and carries its own gates so a regression in the exporter fails independently of
      # the app crate. Its `.vox` parity tests hold the streamed/region export against the dense
      # `Scene::resolve_region` oracle (document's `oracle` feature, TEST-only via its dev-dep).
      - name: Clippy interchange (deny warnings)
        run: cargo clippy -p interchange --all-targets -- -D warnings

      - name: Test interchange
        run: cargo test -p interchange

      # The work library is the ASYNC WORKER POOL + engagement state machine (one layer above
      # display + interchange): it coordinates evaluation -> display -> pixels via async workers
      # (tempos, generations, staleness) and the device-driving orchestrator. It links wgpu
      # deliberately (builds/drives GPU resources off-thread) but imports no shell, and carries its
      # own gates so a regression in the tempo/routing/orchestration fails independently of the app
      # crate. Its tests are pure-CPU (the brick build-equivalence + the routing interlock table),
      # so they run GPU-less here; the orchestrator's device-dependent blocks are covered by the
      # workspace `--features gpu` clippy pass below and the app's `--features gpu` integration tests.
      - name: Clippy work (deny warnings)
        run: cargo clippy -p work --all-targets -- -D warnings

      - name: Test work
        run: cargo test -p work

      # The camera library is the wgpu-free viewing + projective-geometry member
      # (orbit rig, projection, ViewCube, screen→ray unprojection, frustum culling);
      # it depends only on glam + substrate and carries its own gates so a regression
      # in the graphics math fails independently of the app crate.
      - name: Clippy camera (deny warnings)
        run: cargo clippy -p camera --all-targets -- -D warnings

      - name: Test camera
        run: cargo test -p camera

      # The raycast library is the wgpu-free ray–volume traversal member (Amanatides–Woo
      # DDA at block and voxel scale, hierarchical empty-space skip, slab entry, ViewCube
      # element picking); it depends only on glam + substrate and carries its own gates so
      # a regression in the traversal math fails independently of the app crate. The WGSL
      # raymarch shader is its GPU mirror; the app's gpu_parity suite pins the two.
      - name: Clippy raycast (deny warnings)
        run: cargo clippy -p raycast --all-targets -- -D warnings

      - name: Test raycast
        run: cargo test -p raycast

      # The ui library is the egui CONTROL SURFACE (the panel slice of the Shell layer):
      # the right-hand inspector panel that reads the authored document and emits Intents,
      # plus the UI-facing block-palette state. THE LAW: ui links egui + the domain crates
      # it reads (document, voxel_core, camera) — NEVER wgpu/egui-wgpu/display: rendering
      # the 3D scene is display's job, and the palette thumbnails arrive as already-registered
      # egui::TextureIds the shell hands in (the GPU/asset half of the palette stays in the
      # shell's PaletteHost). It carries its own gates so a regression in the control surface
      # fails independently of the app crate.
      - name: Clippy ui (deny warnings)
        run: cargo clippy -p ui --all-targets -- -D warnings

      - name: Test ui
        run: cargo test -p ui

  windows-build:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build all binaries
        run: cargo build --workspace --bins
