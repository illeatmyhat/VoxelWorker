name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # GitHub runners have NO GPU. Building never needs one; the GPU-dependent
  # integration test is gated behind the off-by-default `gpu` feature, so the
  # default `cargo test` is green here. The `shot` binary needs a GPU at run
  # time, so we build it but never execute it. `shot` is the dense-oracle golden
  # tool, so it carries `required-features = ["oracle"]`; the build steps pass
  # `--features oracle` or `cargo build --bins` would silently skip it.
  lint-build-test:
    name: Lint, build & test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps (egui/winit/wgpu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build all binaries
        run: cargo build --bins --features oracle

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      # Documentation gate: broken and redundant intra-doc links fail the build so
      # doc references cannot silently drift from the code (e.g. a link to a renamed
      # or retired symbol). Public->private links are permitted by a crate-level
      # `#![allow(rustdoc::private_intra_doc_links)]`; everything else `-D warnings`
      # catches. `--no-deps` keeps the check to this workspace's own crates.
      - name: Doc (deny broken/redundant intra-doc links)
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Test (GPU-free; `gpu` feature off)
        run: cargo test

      # The substrate library is a separate workspace member with no features
      # and no domain dependencies; it carries its own gates so a regression in
      # the pure CS/math layer fails independently of the app crate.
      - name: Clippy substrate (deny warnings)
        run: cargo clippy -p substrate --all-targets -- -D warnings

      - name: Test substrate
        run: cargo test -p substrate

      # The voxel_core library is the foundational value-vocabulary member (one layer
      # above substrate): the resolved voxel cell + sparse grid, the recentre frame, the
      # SDF value functions, the block-palette id / cell-key codec, the absolute-voxel box
      # + leaf index, and the units core. It depends only on glam + serde + substrate and
      # carries its own gates so a regression in the value layer fails independently.
      - name: Clippy voxel_core (deny warnings)
        run: cargo clippy -p voxel_core --all-targets -- -D warnings

      - name: Test voxel_core
        run: cargo test -p voxel_core

      # The document library is the authored-TRUTH member (one layer above voxel_core):
      # the scene graph, the producers (SdfShape / sketch solid / debug clouds), the 2D
      # sketch, the Intent mutation boundary, and the inverse-command undo stack. It
      # imports no evaluation/display/wgpu and carries its own gates so a regression in
      # the truth layer fails independently of the app crate.
      - name: Clippy document (deny warnings)
        run: cargo clippy -p document --all-targets -- -D warnings

      - name: Test document
        run: cargo test -p document

      # The evaluation library is the ONE EVALUATOR member (one layer above document): the
      # residency + per-chunk resolve store, the boundary-aware two-layer chunk + block
      # classifier, the sparse chunk codec, the out-of-core spill store, and the boundary
      # cuboid decomposition. It consumes the document and produces the classified boundary
      # set, imports no display/work/shell, and carries its own gates so a regression in the
      # evaluator fails independently of the app crate.
      - name: Clippy evaluation (deny warnings)
        run: cargo clippy -p evaluation --all-targets -- -D warnings

      - name: Test evaluation
        run: cargo test -p evaluation

      # The camera library is the wgpu-free viewing + projective-geometry member
      # (orbit rig, projection, ViewCube, screen→ray unprojection, frustum culling);
      # it depends only on glam + substrate and carries its own gates so a regression
      # in the graphics math fails independently of the app crate.
      - name: Clippy camera (deny warnings)
        run: cargo clippy -p camera --all-targets -- -D warnings

      - name: Test camera
        run: cargo test -p camera

      # The raycast library is the wgpu-free ray–volume traversal member (Amanatides–Woo
      # DDA at block and voxel scale, hierarchical empty-space skip, slab entry, ViewCube
      # element picking); it depends only on glam + substrate and carries its own gates so
      # a regression in the traversal math fails independently of the app crate. The WGSL
      # raymarch shader is its GPU mirror; the app's gpu_parity suite pins the two.
      - name: Clippy raycast (deny warnings)
        run: cargo clippy -p raycast --all-targets -- -D warnings

      - name: Test raycast
        run: cargo test -p raycast

  windows-build:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build all binaries
        run: cargo build --bins --features oracle
