name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # GitHub runners have NO GPU. Building never needs one; the GPU-dependent
  # integration test is gated behind the off-by-default `gpu` feature, so the
  # default `cargo test` is green here. The `shot` binary needs a GPU at run
  # time, so we build it but never execute it. `shot` is the dense-oracle golden
  # tool, so it carries `required-features = ["oracle"]`; the build steps pass
  # `--features oracle` or `cargo build --bins` would silently skip it.
  lint-build-test:
    name: Lint, build & test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps (egui/winit/wgpu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build all binaries
        run: cargo build --bins --features oracle

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test (GPU-free; `gpu` feature off)
        run: cargo test

      # The substrate library is a separate workspace member with no features
      # and no domain dependencies; it carries its own gates so a regression in
      # the pure CS/math layer fails independently of the app crate.
      - name: Clippy substrate (deny warnings)
        run: cargo clippy -p substrate --all-targets -- -D warnings

      - name: Test substrate
        run: cargo test -p substrate

      # The camera library is the wgpu-free viewing + projective-geometry member
      # (orbit rig, projection, ViewCube, screen→ray unprojection, frustum culling);
      # it depends only on glam + substrate and carries its own gates so a regression
      # in the graphics math fails independently of the app crate.
      - name: Clippy camera (deny warnings)
        run: cargo clippy -p camera --all-targets -- -D warnings

      - name: Test camera
        run: cargo test -p camera

      # The raycast library is the wgpu-free ray–volume traversal member (Amanatides–Woo
      # DDA at block and voxel scale, hierarchical empty-space skip, slab entry, ViewCube
      # element picking); it depends only on glam + substrate and carries its own gates so
      # a regression in the traversal math fails independently of the app crate. The WGSL
      # raymarch shader is its GPU mirror; the app's gpu_parity suite pins the two.
      - name: Clippy raycast (deny warnings)
        run: cargo clippy -p raycast --all-targets -- -D warnings

      - name: Test raycast
        run: cargo test -p raycast

  windows-build:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build all binaries
        run: cargo build --bins --features oracle
