name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # GitHub runners have NO GPU. Building never needs one; the GPU-dependent
  # integration test is gated behind the off-by-default `gpu` feature, so the
  # default `cargo test` is green here. The `shot` binary needs a GPU at run
  # time, so we build it but never execute it. `shot` is the dense-oracle golden
  # tool, so it carries `required-features = ["oracle"]`; the build steps pass
  # `--features oracle` or `cargo build --bins` would silently skip it.
  lint-build-test:
    name: Lint, build & test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps (egui/winit/wgpu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build all binaries
        run: cargo build --bins --features oracle

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test (GPU-free; `gpu` feature off)
        run: cargo test

  windows-build:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build all binaries
        run: cargo build --bins --features oracle
