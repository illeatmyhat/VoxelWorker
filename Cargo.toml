[package]
name = "voxel_worker"
version = "0.1.0"
edition = "2021"

[lib]
name = "voxel_worker"
path = "src/lib.rs"

[[bin]]
name = "voxel_worker"
path = "src/main.rs"

[[bin]]
name = "shot"
path = "src/bin/shot.rs"

[features]
# Off by default so `cargo test` is green on GPU-less CI runners.
# Enable locally with `cargo test --features gpu` to run the windowed
# (GPU-device-dependent) integration tests.
default = []
gpu = []
# Opt-in CPU frame profiling via the Tracy backend (zones + frame marks).
# OFF by default: with the feature absent the `profiling` facade compiles to
# no-ops and `tracy-client` (and its C/C++ `tracy-client-sys`) is NOT pulled in.
# Run with: `cargo run --features tracy` and connect the Tracy profiler app.
# See docs/profiling.md for the exact matching Tracy app version.
tracy = ["profiling/profile-with-tracy", "dep:tracy-client"]

[dependencies]
winit = "0.30.13"
wgpu = "29.0.3"
egui = "0.34.3"
egui-wgpu = "0.34.3"
egui-winit = "0.34.3"
glam = "0.33.1"
bytemuck = { version = "1.25", features = ["derive"] }
pollster = "0.4"
image = "0.25"
rfd = "0.17"
walkdir = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rayon = "1"
# Profiling facade (no-op unless a backend feature like `tracy` is enabled).
profiling = "1"
# Tracy backend client, only compiled under `--features tracy`. Pinned EXACTLY:
# `profiling 1.0.18`'s `profile-with-tracy` requires `tracy-client = "0.18"`, and
# `tracy-client 0.18.4` (via tracy-client-sys 0.28.0) targets the Tracy profiler
# app **v0.13.1** — protocols are version-locked, so the pin keeps the documented
# app version deterministic (see docs/profiling.md).
tracy-client = { version = "=0.18.4", optional = true }

[dev-dependencies]
dot_vox = "5"
